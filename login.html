<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sky Limited Stores</title>
  <link rel="icon"    href="ChatGPT Image Jun 17, 2026, 09_10_01 PM.png"   type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Top navigation -->
  <header class="topbar">
    <a href="index.html"><img src="images/logo.svg" alt="Sky Limited Stores" class="logo"></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="index.html#shop">Shop</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="active">Login</a>
      <a href="cart.html" class="nav-cart">Cart (0)</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">&#9776;</button>
  </header>

  <section class="auth-section">
    <div class="auth-card">
      <h1 class="auth-title">Login</h1>
      <p class="auth-sub">Sign in to continue.</p>

      <form id="loginForm">
        <div class="auth-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="janedoe221@gmail.com" required>
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••" required>
        </div>
        <button type="submit" class="auth-submit auth-submit--outline">log in</button>
        <p class="auth-sub" style="margin-top: 12px; margin-bottom: 0; text-align: right;">
  <a href="forgot-password.html">Forgot password?</a>
</p>
      </form>
      <p id="formStatus" class="auth-sub" style="margin-top: 16px; margin-bottom: 0;"></p>

      <p class="auth-sub" style="margin-top: 24px; margin-bottom: 0;">Don't have an account? <a href="signup.html">Sign up here.</a></p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <img src="images/logo.svg" alt="Sky Limited Stores" class="logo">
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="index.html#shop">Shop</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login</a>
    </div>
    <div class="footer-copy">&copy; 2026 Sky Limited Stores. All rights reserved.</div>
  </footer>

  <script>
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => {
      navLinks.classList.toggle('open');
    });

    // Show "My Orders" instead of "Login" once the customer is signed in
    (function setupAuthNav() {
      if (!localStorage.getItem('token')) return;
      document.querySelectorAll('a[href="login.html"]').forEach(link => {
        link.textContent = 'My Orders';
        link.setAttribute('href', 'orders.html');
      });
    })();

    // Update cart counter in nav based on items saved in this browser
    (function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.querySelectorAll('.nav-cart').forEach(el => {
        el.textContent = `Cart (${count})`;
      });
    })();

    // ---- Configuration ----
    // While testing on your own computer, the backend runs at this address.
    // Once you deploy the backend online, change this to that URL instead.
    const API_BASE_URL = 'https://sky-limited-stores-backend.onrender.com/api';

    const form = document.getElementById('loginForm');
    const statusEl = document.getElementById('formStatus');
    const submitBtn = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      statusEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'logging in...';

      try {
        const res = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          statusEl.textContent = data.error || 'Something went wrong. Please try again.';
          statusEl.style.color = '#ff6b6b';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        statusEl.textContent = 'Logged in! Redirecting...';
        statusEl.style.color = 'var(--green)';

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } catch (err) {
        statusEl.textContent = 'Could not reach the server. Is the backend running?';
        statusEl.style.color = '#ff6b6b';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'log in';
      }
    });
  </script>

</body>
</html>
