<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sky Limited Stores</title>
  <link rel="icon" href="ChatGPT Image Jun 17, 2026, 09_10_01 PM.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── User avatar in nav ── */
    .nav-avatar-wrap { position: relative; display: flex; align-items: center; }

    .nav-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--green); color: #000;
      font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid transparent;
      transition: border-color 0.2s;
      user-select: none; flex-shrink: 0;
    }
    .nav-avatar:hover { border-color: var(--green); background: transparent; color: var(--green); }

    .avatar-dropdown {
      display: none; position: absolute; top: calc(100% + 10px); right: 0;
      background: var(--card-bg, #111); border: 1px solid var(--border, #2a2a2a);
      border-radius: 10px; padding: 14px 16px; min-width: 210px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 999;
    }
    .avatar-dropdown.open { display: block; }
    .avatar-dropdown .dd-email {
      font-size: 12px; color: var(--text-dim, #888); word-break: break-all;
      margin-bottom: 12px; line-height: 1.4;
    }
    .avatar-dropdown .dd-name {
      font-size: 14px; font-weight: 600; color: var(--text, #fff);
      margin-bottom: 4px;
    }
    .avatar-dropdown a {
      display: block; font-size: 13px; padding: 7px 0;
      color: var(--text, #eee); text-decoration: none; border-top: 1px solid var(--border, #2a2a2a);
    }
    .avatar-dropdown a:hover { color: var(--green); }
    .avatar-dropdown .dd-logout { color: #ff6b6b !important; cursor: pointer; }
    .avatar-dropdown .dd-logout:hover { color: #ff4444 !important; }
  </style>
</head>
<body>

  <!-- Top navigation -->
  <header class="topbar">
    <a href="index.html"><img src="images/logo.svg" alt="Sky Limited Stores" class="logo"></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="index.html#shop">Shop</a>
      <a href="contact.html">Contact</a>
      <!-- Login link shown only when logged out; replaced by avatar when logged in -->
      <a href="login.html" class="active" id="navLoginLink">Login</a>
      <a href="cart.html" class="nav-cart">Cart (0)</a>
    </nav>
    <!-- Avatar (hidden until logged in) -->
    <div class="nav-avatar-wrap" id="navAvatarWrap" style="display:none;">
      <div class="nav-avatar" id="navAvatar" title="Account" aria-haspopup="true" aria-expanded="false"></div>
      <div class="avatar-dropdown" id="avatarDropdown">
        <div class="dd-name" id="ddName"></div>
        <div class="dd-email" id="ddEmail"></div>
        <a href="orders.html">My Orders</a>
        <a class="dd-logout" id="ddLogout">Log out</a>
      </div>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">&#9776;</button>
  </header>

  <section class="auth-section">
    <div class="auth-card">
      <h1 class="auth-title">Login</h1>
      <p class="auth-sub">Sign in to continue.</p>

      <form id="loginForm">
        <div class="auth-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="janedoe221@gmail.com" required>
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••" required>
        </div>
        <button type="submit" class="auth-submit auth-submit--outline">log in</button>
      </form>
      <p class="auth-sub" style="margin-top: 12px; margin-bottom: 0; text-align: right;">
        <a href="forgot-password.html">Forgot password?</a>
      </p>
      <p id="formStatus" class="auth-sub" style="margin-top: 16px; margin-bottom: 0;"></p>
      <p class="auth-sub" style="margin-top: 24px; margin-bottom: 0;">Don't have an account? <a href="signup.html">Sign up here.</a></p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <img src="images/logo.svg" alt="Sky Limited Stores" class="logo">
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="index.html#shop">Shop</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login</a>
    </div>
    <div class="footer-copy">&copy; 2026 Sky Limited Stores. All rights reserved.</div>
  </footer>

  <script>
    // ── Mobile nav toggle ──
    const navToggle = document.getElementById('navToggle');
    const navLinks  = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));

    // ── Cart counter ──
    (function updateCartCount() {
      const cart  = JSON.parse(localStorage.getItem('cart') || '[]');
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.querySelectorAll('.nav-cart').forEach(el => el.textContent = `Cart (${count})`);
    })();

    // ── Avatar setup (shared helper used on every page) ──
    (function setupAvatar() {
      const token = localStorage.getItem('token');
      const user  = JSON.parse(localStorage.getItem('user') || 'null');
      if (!token || !user) return;

      // Hide the plain Login link
      const loginLink = document.getElementById('navLoginLink');
      if (loginLink) loginLink.style.display = 'none';

      // Build initials
      const name     = user.name || user.email || '?';
      const initials = name.trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0, 2).join('');

      const avatarWrap = document.getElementById('navAvatarWrap');
      const avatar     = document.getElementById('navAvatar');
      const dropdown   = document.getElementById('avatarDropdown');
      const ddName     = document.getElementById('ddName');
      const ddEmail    = document.getElementById('ddEmail');

      avatar.textContent = initials;
      ddName.textContent  = user.name  || '';
      ddEmail.textContent = user.email || '';
      avatarWrap.style.display = 'flex';

      // Toggle dropdown
      avatar.addEventListener('click', (e) => {
        e.stopPropagation();
        const open = dropdown.classList.toggle('open');
        avatar.setAttribute('aria-expanded', open);
      });
      document.addEventListener('click', () => {
        dropdown.classList.remove('open');
        avatar.setAttribute('aria-expanded', 'false');
      });

      // Logout
      document.getElementById('ddLogout').addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      });
    })();

    // ── If already logged in, go home ──
    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    // ── Configuration ──
    const API_BASE_URL = 'https://sky-limited-stores-backend.onrender.com/api';

    const form      = document.getElementById('loginForm');
    const statusEl  = document.getElementById('formStatus');
    const submitBtn = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      statusEl.textContent = '';
      submitBtn.disabled   = true;
      submitBtn.textContent = 'logging in...';

      try {
        const res  = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          statusEl.textContent  = data.error || 'Something went wrong. Please try again.';
          statusEl.style.color  = '#ff6b6b';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user',  JSON.stringify(data.user));

        statusEl.textContent = 'Logged in! Redirecting...';
        statusEl.style.color = 'var(--green)';
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      } catch (err) {
        statusEl.textContent = 'Could not reach the server. Is the backend running?';
        statusEl.style.color = '#ff6b6b';
      } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = 'log in';
      }
    });
  </script>

</body>
</html>
