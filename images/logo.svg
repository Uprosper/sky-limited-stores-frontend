<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="monoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E89E"/>
      <stop offset="100%" stop-color="#FFE600"/>
    </linearGradient>
  </defs>

  <!-- SL monogram badge -->
  <rect x="6" y="8" width="64" height="64" fill="none" stroke="url(#monoGrad)" stroke-width="4" filter="url(#glow)"/>
  <text x="38" y="56" font-family="'Space Mono', 'Courier New', monospace" font-weight="700" font-size="38" letter-spacing="-2" fill="#00E89E" text-anchor="middle" filter="url(#glow)">SL</text>

  <!-- SKY LIMITED STORES wordmark -->
  <text x="86" y="44" font-family="'Space Mono', 'Courier New', monospace" font-weight="700" font-size="28" letter-spacing="5" fill="#00E89E" filter="url(#glow)">SKY</text>
  <text x="88" y="64" font-family="'Space Mono', 'Courier New', monospace" font-weight="700" font-size="11" letter-spacing="4" fill="#FFE600">LIMITED STORES</text>
</svg>
