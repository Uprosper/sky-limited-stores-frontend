<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — Sky Limited Stores</title>
  <link rel="icon" href="ChatGPT Image Jun 17, 2026, 09_10_01 PM.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Avatar / profile chip in nav ── */
    .nav-avatar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text, #e0e0e0);
      font-family: var(--font-body, 'Inter', sans-serif);
      font-size: 14px;
      font-weight: 500;
      transition: opacity .2s;
    }
    .nav-avatar:hover { opacity: .8; }
    .nav-avatar img,
    .nav-avatar .avatar-initials {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--green, #00ff9d);
      flex-shrink: 0;
    }
    .nav-avatar .avatar-initials {
      background: var(--green, #00ff9d);
      color: #0a0e27;
      font-weight: 700;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- Top navigation -->
  <header class="topbar">
    <a href="index.html"><img src="images/logo.svg" alt="Sky Limited Stores" class="logo"></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="index.html#shop">Shop</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" id="authNavLink">Login</a>
      <a href="cart.html" class="nav-cart active">Cart (0)</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">&#9776;</button>
  </header>

  <section class="section">
    <div class="section-eyebrow">Checkout</div>
    <h2 class="section-title">Your Cart</h2>
    <p class="section-sub">Review your items, enter your shipping details, and pay securely with Paystack.</p>

    <div class="contact-grid">

      <!-- Cart items -->
      <div>
        <div id="cartItems"></div>
        <div id="cartTotalRow" class="value-item" style="margin-top: 20px; display: none;">
          <h3>Total</h3>
          <p id="cartTotal" style="font-family: var(--font-display); font-size: 22px; color: var(--green);"></p>
        </div>
      </div>

      <!-- Shipping & payment form -->
      <div class="form-wrap" style="margin:0;" id="checkoutForm">
        <h3 style="font-family: var(--font-display); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--yellow); margin-bottom: 20px;">Shipping Details</h3>

        <form id="orderForm">
          <div class="form-field">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required>
          </div>
          <div class="form-field">
            <label for="address">Street Address</label>
            <input type="text" id="address" name="address" placeholder="123 Main St" required>
          </div>
          <div class="form-field">
            <label for="city">City</label>
            <input type="text" id="city" name="city" placeholder="Lagos" required>
          </div>
          <div class="form-field">
            <label for="state">State</label>
            <input type="text" id="state" name="state" placeholder="Lagos State">
          </div>
          <div class="form-field">
            <label for="country">Country</label>
            <input type="text" id="country" name="country" placeholder="Nigeria" required>
          </div>
          <div class="form-field">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+2348012345678">
          </div>

          <div class="form-field">
            <label>Payment Method</label>
            <div style="margin-top: 8px; font-family: var(--font-body); font-size: 14px; color: var(--text);">
              Pay securely with Paystack (card, bank transfer, or USSD)
            </div>
            <input type="hidden" name="paymentMethod" value="paystack">
          </div>

          <button type="submit" class="form-submit" id="checkoutBtn">Place Order</button>
          <p id="formStatus" style="margin-top: 12px; margin-bottom: 0; font-size: 13px;"></p>
        </form>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <img src="images/logo.svg" alt="Sky Limited Stores" class="logo">
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="index.html#shop">Shop</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login</a>
    </div>
    <div class="footer-copy">&copy; 2026 Sky Limited Stores. All rights reserved.</div>
  </footer>

  <script>
    // ── Mobile nav toggle ──────────────────────────────────────────────────────
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });

    // ── HARD LOGIN GATE — redirect immediately if not signed in ───────────────
    if (!localStorage.getItem('token')) {
      // Save where they were headed so we can return them after login
      sessionStorage.setItem('redirectAfterLogin', 'cart.html');
      window.location.href = 'login.html';
    }

    // ── Auth nav: replace "Login" link with avatar chip ───────────────────────
    (function setupAuthNav() {
      const token = localStorage.getItem('token');
      const authLink = document.getElementById('authNavLink');
      if (!token || !authLink) return;

      let user = {};
      try { user = JSON.parse(localStorage.getItem('user') || '{}'); } catch (_) {}

      const name     = user.name  || 'Account';
      const email    = user.email || '';
      const initials = name.trim().split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      const avatarUrl = `https://www.gravatar.com/avatar/${md5(email.trim().toLowerCase())}?d=404&s=64`;

      const chip = document.createElement('a');
      chip.href  = 'orders.html';
      chip.className = 'nav-avatar';
      chip.title = `Signed in as ${name}`;

      const img  = document.createElement('img');
      img.src    = avatarUrl;
      img.alt    = initials;
      img.onerror = function () {
        const bubble = document.createElement('span');
        bubble.className   = 'avatar-initials';
        bubble.textContent = initials;
        chip.replaceChild(bubble, img);
      };

      chip.appendChild(img);
      chip.appendChild(document.createTextNode(name.split(' ')[0]));
      authLink.replaceWith(chip);
    })();

    // Tiny MD5 (for Gravatar)
    function md5(s){function L(k,d){return(k<<d)|(k>>>(32-d))}function K(G,k){var I,d,F,H,x;F=(G&2147483648);H=(k&2147483648);I=(G&1073741824);d=(k&1073741824);x=(G&1073741823)+(k&1073741823);if(I&d){return(x^2147483648^F^H)}if(I|d){if(x&1073741824){return(x^3221225472^F^H)}else{return(x^1073741824^F^H)}}else{return(x^F^H)}}function r(d,F,k,I,G,H,x){d=K(d,K(K((F&k)|(~F&I),G),x));return K(L(d,H),F)}function q(d,F,k,I,G,H,x){d=K(d,K(K((F&I)|(k&~I),G),x));return K(L(d,H),F)}function p(d,F,k,I,G,H,x){d=K(d,K(K(F^k^I,G),x));return K(L(d,H),F)}function n(d,F,k,I,G,H,x){d=K(d,K(K(k^(F|~I),G),x));return K(L(d,H),F)}function u(G){var F="",k="",H,d;for(d=0;d<=3;d++){H=(G>>>(d*8))&255;k="0"+H.toString(16);F+=k.substr(k.length-2,2)}return F}var e=[],b,J,j,A,C,B,D,E,v,g,h,f,o=[];s=function(G){var F,k=G.length,H=k+8,d=(H-(H%64))/64,I=(d+1)*16,x=Array(I-1),m=0,a=0;while(a<k){F=(a-(a%4))/4;m=a%4*8;x[F]=(x[F]|(G.charCodeAt(a)<<m));a++}F=(a-(a%4))/4;x[F]=(x[F]|(128<<(a%4*8)));x[I-2]=k<<3;x[I-1]=k>>>29;return x}(s);b=1732584193;J=4023233417;j=2562383102;A=271733878;for(C=0;C<s.length;C+=16){B=b;D=J;E=j;v=A;b=r(b,J,j,A,s[C],7,3614090360);A=r(A,b,J,j,s[C+1],12,3905402710);j=r(j,A,b,J,s[C+2],17,606105819);J=r(J,j,A,b,s[C+3],22,3250441966);b=r(b,J,j,A,s[C+4],7,4118548399);A=r(A,b,J,j,s[C+5],12,1200080426);j=r(j,A,b,J,s[C+6],17,2821735955);J=r(J,j,A,b,s[C+7],22,4249261313);b=r(b,J,j,A,s[C+8],7,1770035416);A=r(A,b,J,j,s[C+9],12,2336552879);j=r(j,A,b,J,s[C+10],17,4294925233);J=r(J,j,A,b,s[C+11],22,2304563134);b=r(b,J,j,A,s[C+12],7,1804603682);A=r(A,b,J,j,s[C+13],12,4254626195);j=r(j,A,b,J,s[C+14],17,2792965006);J=r(J,j,A,b,s[C+15],22,1236535329);b=q(b,J,j,A,s[C+1],5,4129170786);A=q(A,b,J,j,s[C+6],9,3225465664);j=q(j,A,b,J,s[C+11],14,643717713);J=q(J,j,A,b,s[C],20,3921069994);b=q(b,J,j,A,s[C+5],5,3593408605);A=q(A,b,J,j,s[C+10],9,38016083);j=q(j,A,b,J,s[C+15],14,3634488961);J=q(J,j,A,b,s[C+4],20,3889429448);b=q(b,J,j,A,s[C+9],5,568446438);A=q(A,b,J,j,s[C+14],9,3275163606);j=q(j,A,b,J,s[C+3],14,4107603335);J=q(J,j,A,b,s[C+8],20,1163531501);b=q(b,J,j,A,s[C+13],5,2850285829);A=q(A,b,J,j,s[C+2],9,4243563512);j=q(j,A,b,J,s[C+7],14,1735328473);J=q(J,j,A,b,s[C+12],20,2368359562);b=p(b,J,j,A,s[C+5],4,4294588738);A=p(A,b,J,j,s[C+8],11,2272392833);j=p(j,A,b,J,s[C+11],16,1839030562);J=p(J,j,A,b,s[C+14],23,4259657740);b=p(b,J,j,A,s[C+1],4,2763975236);A=p(A,b,J,j,s[C+4],11,1272893353);j=p(j,A,b,J,s[C+7],16,4139469664);J=p(J,j,A,b,s[C+10],23,3200236656);b=p(b,J,j,A,s[C+13],4,681279174);A=p(A,b,J,j,s[C],11,3936430074);j=p(j,A,b,J,s[C+3],16,3572445317);J=p(J,j,A,b,s[C+6],23,76029189);b=p(b,J,j,A,s[C+9],4,3654602809);A=p(A,b,J,j,s[C+12],11,3873151461);j=p(j,A,b,J,s[C+15],16,530742520);J=p(J,j,A,b,s[C+2],23,3299628645);b=n(b,J,j,A,s[C],6,4096336452);A=n(A,b,J,j,s[C+7],10,1126891415);j=n(j,A,b,J,s[C+14],15,2878612391);J=n(J,j,A,b,s[C+5],21,4237533241);b=n(b,J,j,A,s[C+12],6,1700485571);A=n(A,b,J,j,s[C+3],10,2399980690);j=n(j,A,b,J,s[C+10],15,4293915773);J=n(J,j,A,b,s[C+1],21,2240044497);b=n(b,J,j,A,s[C+8],6,1873313359);A=n(A,b,J,j,s[C+15],10,4264355552);j=n(j,A,b,J,s[C+6],15,2734768916);J=n(J,j,A,b,s[C+13],21,1309151649);b=n(b,J,j,A,s[C+4],6,4149444226);A=n(A,b,J,j,s[C+11],10,3174756917);j=n(j,A,b,J,s[C+2],15,718787259);J=n(J,j,A,b,s[C+9],21,3951481745);b=K(b,B);J=K(J,D);j=K(j,E);A=K(A,v)}return(u(b)+u(J)+u(j)+u(A)).toLowerCase()}

    // ── Config ────────────────────────────────────────────────────────────────
    const API_BASE_URL       = 'https://sky-limited-stores-backend.onrender.com/api';
    const MINIMUM_ORDER_AMOUNT = 10000;

    const cartItemsEl  = document.getElementById('cartItems');
    const cartTotalRow = document.getElementById('cartTotalRow');
    const cartTotalEl  = document.getElementById('cartTotal');
    const checkoutForm = document.getElementById('checkoutForm');
    const formStatus   = document.getElementById('formStatus');
    const checkoutBtn  = document.getElementById('checkoutBtn');

    function getCart()       { return JSON.parse(localStorage.getItem('cart') || '[]'); }
    function saveCart(cart)  { localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); }

    function updateCartCount() {
      const count = getCart().reduce((sum, item) => sum + item.quantity, 0);
      document.querySelectorAll('.nav-cart').forEach(el => { el.textContent = `Cart (${count})`; });
    }

    function renderCart() {
      const cart = getCart();

      if (!cart.length) {
        cartItemsEl.innerHTML = '<p class="section-sub">Your cart is empty. <a href="index.html#shop" style="color: var(--green);">Browse products</a> to add something.</p>';
        cartTotalRow.style.display = 'none';
        checkoutForm.style.display = 'none';
        return;
      }

      checkoutForm.style.display = '';

      cartItemsEl.innerHTML = cart.map((item, i) => `
        <div class="product-card" style="display:flex; align-items:center; gap:16px; padding:16px; margin-bottom:12px;">
          <div style="flex:1;">
            <div class="product-name">${item.name}</div>
            <div class="product-meta">₦${item.price.toFixed(2)} each</div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <button class="add-btn qty-btn" data-i="${i}" data-dir="-1">&minus;</button>
            <span style="min-width:24px; text-align:center;">${item.quantity}</span>
            <button class="add-btn qty-btn" data-i="${i}" data-dir="1">+</button>
          </div>
          <div style="font-family: var(--font-display); color: var(--green); min-width:70px; text-align:right;">
            ₦${(item.price * item.quantity).toFixed(2)}
          </div>
          <button class="add-btn remove-btn" data-i="${i}" style="border-color:#ff6b6b; color:#ff6b6b;">Remove</button>
        </div>
      `).join('');

      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      cartTotalRow.style.display = '';
      cartTotalEl.textContent = `₦${total.toFixed(2)}`;

      if (total < MINIMUM_ORDER_AMOUNT) {
        checkoutBtn.disabled = true;
        checkoutBtn.style.opacity  = '0.5';
        checkoutBtn.style.cursor   = 'not-allowed';
        formStatus.style.color     = '#ff6b6b';
        formStatus.textContent     = `Minimum order is ₦10,000. Please add ₦${(MINIMUM_ORDER_AMOUNT - total).toFixed(2)} more to checkout.`;
      } else {
        checkoutBtn.disabled       = false;
        checkoutBtn.style.opacity  = '1';
        checkoutBtn.style.cursor   = 'pointer';
        formStatus.textContent     = '';
      }

      cartItemsEl.querySelectorAll('.qty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = parseInt(btn.dataset.i, 10);
          const cart = getCart();
          cart[i].quantity += parseInt(btn.dataset.dir, 10);
          if (cart[i].quantity < 1) cart[i].quantity = 1;
          saveCart(cart);
          renderCart();
        });
      });

      cartItemsEl.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const cart = getCart();
          cart.splice(parseInt(btn.dataset.i, 10), 1);
          saveCart(cart);
          renderCart();
        });
      });
    }

    // ── Order form submit ─────────────────────────────────────────────────────
    document.getElementById('orderForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const token = localStorage.getItem('token');
      if (!token) { window.location.href = 'login.html'; return; }

      const cart  = getCart();
      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      if (total < MINIMUM_ORDER_AMOUNT) return;

      formStatus.style.color = 'var(--yellow)';
      formStatus.textContent = 'Creating order request...';
      checkoutBtn.disabled   = true;

      const shippingAddress = {
        fullName: document.getElementById('fullName').value,
        address:  document.getElementById('address').value,
        city:     document.getElementById('city').value,
        state:    document.getElementById('state').value,
        country:  document.getElementById('country').value,
        phone:    document.getElementById('phone').value,
      };

      try {
        const res  = await fetch(`${API_BASE_URL}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ items: cart, shippingAddress }),
        });
        const data = await res.json();

        if (!res.ok) {
          formStatus.style.color = '#ff6b6b';
          formStatus.textContent = data.error || 'Failed to place order.';
          checkoutBtn.disabled   = false;
          return;
        }

        localStorage.removeItem('cart');
        formStatus.style.color = 'var(--green)';
        formStatus.textContent = 'Redirecting you to Paystack...';
        window.location.href   = data.payment.authorizationUrl;
      } catch (err) {
        formStatus.style.color = '#ff6b6b';
        formStatus.textContent = 'Could not reach server.';
        checkoutBtn.disabled   = false;
      }
    });

    renderCart();
    updateCartCount();
  </script>
</body>
</html>
