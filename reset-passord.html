<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Sky Limited Stores</title>
  <link rel="icon"    href="ChatGPT Image Jun 17, 2026, 09_10_01 PM.png"   type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Top navigation -->
  <header class="topbar">
    <a href="index.html"><img src="images/logo.svg" alt="Sky Limited Stores" class="logo"></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="index.html#shop">Shop</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="active">Login</a>
      <a href="cart.html" class="nav-cart">Cart (0)</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">&#9776;</button>
  </header>

  <section class="auth-section">
    <div class="auth-card">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub" id="introText">Enter a new password for your account.</p>

      <form id="resetForm">
        <div class="auth-field">
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" placeholder="••••••" required minlength="6">
        </div>
        <div class="auth-field">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••" required minlength="6">
        </div>
        <button type="submit" class="auth-submit auth-submit--outline">reset password</button>
      </form>
      <p id="formStatus" class="auth-sub" style="margin-top: 16px; margin-bottom: 0;"></p>

      <p class="auth-sub" style="margin-top: 24px; margin-bottom: 0;"><a href="login.html">Back to login.</a></p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <img src="images/logo.svg" alt="Sky Limited Stores" class="logo">
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="index.html#shop">Shop</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login</a>
    </div>
    <div class="footer-copy">&copy; 2026 Sky Limited Stores. All rights reserved.</div>
  </footer>

  <script>
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => {
      navLinks.classList.toggle('open');
    });

    (function setupAuthNav() {
      if (!localStorage.getItem('token')) return;
      document.querySelectorAll('a[href="login.html"]').forEach(link => {
        link.textContent = 'My Orders';
        link.setAttribute('href', 'orders.html');
      });
    })();

    (function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.querySelectorAll('.nav-cart').forEach(el => {
        el.textContent = `Cart (${count})`;
      });
    })();

    // ---- Configuration ----
    const API_BASE_URL = 'https://sky-limited-stores-backend.onrender.com/api';

    const form = document.getElementById('resetForm');
    const statusEl = document.getElementById('formStatus');
    const introText = document.getElementById('introText');
    const submitBtn = form.querySelector('button[type="submit"]');

    // Grab the token from the URL, e.g. reset-password.html?token=abc123
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      introText.textContent = 'This reset link is missing or invalid.';
      introText.style.color = '#ff6b6b';
      form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      statusEl.textContent = '';

      if (password !== confirmPassword) {
        statusEl.textContent = 'Passwords do not match.';
        statusEl.style.color = '#ff6b6b';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'resetting...';

      try {
        const res = await fetch(`${API_BASE_URL}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          statusEl.textContent = data.error || 'Something went wrong. Please try again.';
          statusEl.style.color = '#ff6b6b';
          return;
        }

        statusEl.textContent = 'Password updated! Redirecting to login...';
        statusEl.style.color = 'var(--green)';
        form.reset();

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      } catch (err) {
        statusEl.textContent = 'Could not reach the server. Please try again later.';
        statusEl.style.color = '#ff6b6b';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'reset password';
      }
    });
  </script>

</body>
</html>
